<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading… — Srikant</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css">
</head>
<body data-page="post">

<div class="progress-bar" id="progress-bar"></div>
<div id="sidebar-root"></div>

<main class="main">
  <div class="page-header" style="background:var(--bg);">
    <!-- Back link -->
    <a id="back-link" href="javascript:history.back()"
       style="display:inline-flex;align-items:center;gap:0.35em;font-size:0.8rem;color:var(--ink-3);margin-bottom:1rem;transition:color 180ms ease;"
       onmouseover="this.style.color='var(--ink-1)'" onmouseout="this.style.color='var(--ink-3)'">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M13 8H3M7 4l-4 4 4 4"/>
      </svg>
      Back
    </a>
    <h1 class="post-title" id="post-title" style="font-size:clamp(1.3rem,3vw,1.8rem);font-weight:400;letter-spacing:-0.03em;line-height:1.25;color:var(--ink-1);margin-bottom:1rem;">
      <span class="spinner" style="display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--ink-3);border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;"></span>
    </h1>
    <div class="post-meta" id="post-meta"></div>
  </div>

  <div class="post-wrap">
    <!-- Main prose -->
    <article class="post-content">
      <div id="post-loading" class="state-loading">
        <span class="spinner"></span> Loading content…
      </div>
      <div class="prose" id="prose"></div>
    </article>

    <!-- TOC aside -->
    <aside class="post-aside">
      <div class="toc" id="toc"></div>
    </aside>
  </div>

  <!-- Footer -->
  <footer class="site-footer">
    <nav class="site-footer__nav">
      <a href="index.html">Home</a>
      <a href="projects.html">Projects</a>
      <a href="research.html">Research</a>
      <a href="about.html">About</a>
    </nav>
    <span class="site-footer__copy">© 2025 Srikant Singh</span>
  </footer>
</main>

<script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-python.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-bash.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-docker.min.js"></script>
<script src="assets/js/sidebar.js"></script>
<script src="assets/js/main.js"></script>
</body>
</html>

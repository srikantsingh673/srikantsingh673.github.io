<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d0d"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.8"/>
  </pattern>
  <rect width="800" height="450" fill="url(#g)"/>

  <!-- Title -->
  <text x="400" y="55" font-family="Inter,sans-serif" font-size="21" font-weight="700" fill="white" text-anchor="middle">Distributed Task Engine</text>

  <!-- API box -->
  <rect x="320" y="80" width="160" height="44" rx="8" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <text x="400" y="107" font-family="monospace" font-size="12" fill="white" text-anchor="middle">Django API</text>

  <!-- RabbitMQ -->
  <rect x="310" y="170" width="180" height="44" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
  <text x="400" y="197" font-family="monospace" font-size="12" fill="rgba(255,255,255,0.7)" text-anchor="middle">RabbitMQ</text>

  <!-- Workers -->
  <rect x="100" y="270" width="120" height="44" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="160" y="291" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.55)" text-anchor="middle">email</text>
  <text x="160" y="305" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.55)" text-anchor="middle">worker</text>

  <rect x="340" y="270" width="120" height="44" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="400" y="291" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.55)" text-anchor="middle">export</text>
  <text x="400" y="305" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.55)" text-anchor="middle">worker</text>

  <rect x="580" y="270" width="120" height="44" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="640" y="291" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.55)" text-anchor="middle">ml-infer</text>
  <text x="640" y="305" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.55)" text-anchor="middle">worker</text>

  <!-- DB -->
  <rect x="300" y="370" width="200" height="36" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="400" y="393" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.35)" text-anchor="middle">PostgreSQL</text>

  <!-- Arrows -->
  <defs>
    <marker id="ar" markerWidth="6" markerHeight="6" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="rgba(255,255,255,0.5)"/>
    </marker>
  </defs>
  <line x1="400" y1="124" x2="400" y2="168" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="340" y1="192" x2="222" y2="270" stroke="rgba(255,255,255,0.2)" stroke-width="1.2" stroke-dasharray="5,3"/>
  <line x1="400" y1="214" x2="400" y2="268" stroke="rgba(255,255,255,0.2)" stroke-width="1.2" stroke-dasharray="5,3"/>
  <line x1="460" y1="192" x2="578" y2="270" stroke="rgba(255,255,255,0.2)" stroke-width="1.2" stroke-dasharray="5,3"/>
  <line x1="400" y1="314" x2="400" y2="368" stroke="rgba(255,255,255,0.12)" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Stats strip -->
  <text x="140" y="435" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.25)" text-anchor="middle">50k+ tasks/day</text>
  <text x="400" y="435" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.25)" text-anchor="middle">failure rate &lt; 0.3%</text>
  <text x="650" y="435" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.25)" text-anchor="middle">Prometheus + Grafana</text>
</svg>

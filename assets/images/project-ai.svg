<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d0d"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.03"/>
      <stop offset="100%" style="stop-color:#0d0d0d;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="url(#glow)"/>
  <pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.8"/>
  </pattern>
  <rect width="800" height="450" fill="url(#g)"/>

  <!-- Title -->
  <text x="400" y="52" font-family="Inter,sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">RAG-Powered Knowledge Base</text>

  <!-- Docs source -->
  <rect x="40" y="90" width="130" height="80" rx="10" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="105" y="125" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.65)" text-anchor="middle">Documents</text>
  <text x="105" y="140" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.35)" text-anchor="middle">Confluence · GitHub</text>
  <text x="105" y="153" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.35)" text-anchor="middle">Markdown</text>

  <!-- Embed -->
  <rect x="240" y="90" width="130" height="80" rx="10" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="305" y="122" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.65)" text-anchor="middle">Embed</text>
  <text x="305" y="137" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.35)" text-anchor="middle">sentence-transformers</text>
  <text x="305" y="152" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.35)" text-anchor="middle">all-mpnet-v2</text>

  <!-- FAISS -->
  <rect x="440" y="90" width="130" height="80" rx="10" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <text x="505" y="122" font-family="monospace" font-size="10" fill="white" text-anchor="middle">FAISS Index</text>
  <text x="505" y="137" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.6)" text-anchor="middle">18k+ vectors</text>
  <text x="505" y="152" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.6)" text-anchor="middle">HNSW graph</text>

  <!-- LLM -->
  <rect x="630" y="90" width="130" height="80" rx="10" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="695" y="125" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.65)" text-anchor="middle">LLM</text>
  <text x="695" y="140" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.35)" text-anchor="middle">Claude API</text>

  <!-- Arrows top -->
  <defs>
    <marker id="ar" markerWidth="6" markerHeight="6" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="rgba(255,255,255,0.5)"/>
    </marker>
  </defs>
  <line x1="170" y1="130" x2="238" y2="130" stroke="rgba(255,255,255,0.35)" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="370" y1="130" x2="438" y2="130" stroke="rgba(255,255,255,0.35)" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="570" y1="130" x2="628" y2="130" stroke="rgba(255,255,255,0.35)" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Query flow (bottom) -->
  <rect x="310" y="250" width="180" height="44" rx="8" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
  <text x="400" y="270" font-family="monospace" font-size="10" fill="white" text-anchor="middle">FastAPI /query</text>
  <text x="400" y="285" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.45)" text-anchor="middle">embed → retrieve → rerank → generate</text>

  <line x1="505" y1="170" x2="505" y2="230" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="505" y1="230" x2="492" y2="250" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="695" y1="170" x2="695" y2="230" stroke="rgba(255,255,255,0.12)" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="695" y1="230" x2="492" y2="268" stroke="rgba(255,255,255,0.12)" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Reranker note -->
  <rect x="100" y="320" width="180" height="36" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="190" y="343" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.3)" text-anchor="middle">cross-encoder rerank</text>

  <!-- Stats -->
  <text x="130" y="415" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.25)" text-anchor="middle">p95 latency: 1.8s</text>
  <text x="400" y="415" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.25)" text-anchor="middle">search time ↓ 70%</text>
  <text x="660" y="415" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.25)" text-anchor="middle">MRR@5: 0.83</text>
</svg>

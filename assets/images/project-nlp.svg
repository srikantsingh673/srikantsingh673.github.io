<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d0d"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.06"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.03"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.8"/>
  </pattern>
  <rect width="800" height="450" fill="url(#g)"/>

  <!-- Pipeline boxes -->
  <rect x="60" y="160" width="110" height="44" rx="8" fill="url(#card)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="115" y="187" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.65)" text-anchor="middle">Input Text</text>

  <rect x="220" y="160" width="110" height="44" rx="8" fill="url(#card)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="275" y="187" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.65)" text-anchor="middle">Lang Detect</text>

  <rect x="380" y="160" width="110" height="44" rx="8" fill="url(#card)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="435" y="187" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.65)" text-anchor="middle">mBERT NER</text>

  <rect x="540" y="160" width="110" height="44" rx="8" fill="url(#card)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="595" y="187" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.65)" text-anchor="middle">Classifier</text>

  <rect x="680" y="160" width="80" height="44" rx="8" fill="rgba(255,255,255,0.12)" stroke="none"/>
  <text x="720" y="187" font-family="monospace" font-size="11" fill="white" text-anchor="middle">Output</text>

  <!-- Arrows -->
  <defs>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="rgba(255,255,255,0.5)"/>
    </marker>
  </defs>
  <line x1="170" y1="182" x2="218" y2="182" stroke="rgba(255,255,255,0.35)" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="330" y1="182" x2="378" y2="182" stroke="rgba(255,255,255,0.35)" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="490" y1="182" x2="538" y2="182" stroke="rgba(255,255,255,0.35)" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="650" y1="182" x2="678" y2="182" stroke="rgba(255,255,255,0.35)" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Redis cache box below -->
  <rect x="270" y="260" width="220" height="36" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="380" y="283" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.4)" text-anchor="middle">Redis Cache (SHA-256 key)</text>
  <line x1="380" y1="204" x2="380" y2="260" stroke="rgba(255,255,255,0.12)" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Title -->
  <text x="400" y="60" font-family="Inter,sans-serif" font-size="22" font-weight="700" fill="white" text-anchor="middle" letter-spacing="-0.5">Multilingual NLP Pipeline</text>
  <!-- Pill tags -->
  <rect x="226" y="380" width="80" height="22" rx="11" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="266" y="395" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.5)" text-anchor="middle">FastAPI</text>
  <rect x="316" y="380" width="110" height="22" rx="11" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="371" y="395" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.5)" text-anchor="middle">HuggingFace</text>
  <rect x="436" y="380" width="60" height="22" rx="11" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="466" y="395" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.5)" text-anchor="middle">Redis</text>
  <rect x="506" y="380" width="70" height="22" rx="11" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="541" y="395" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.5)" text-anchor="middle">Docker</text>
  <!-- Subtle glow -->
  <circle cx="720" cy="60" r="80" fill="rgba(255,255,255,0.02)"/>
</svg>
